<div class="modal">
  <div class="modal-content">
    <h3>{{ task ? 'Editar tarea' : 'Nueva tarea' }}</h3>
    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
      <label for="titulo">Título *</label>
      <input id="titulo" formControlName="titulo">
      @if (taskForm.get('titulo')?.invalid && taskForm.get('titulo')?.touched) {
        <div class="error">
          Mínimo 3 caracteres
        </div>
      }

      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" formControlName="descripcion"></textarea>

      <label for="prioridad">Prioridad</label>
      <select id="prioridad" formControlName="prioridad">
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>

      <div class="actions">
        <button type="button" (click)="cancel()">Cancelar</button>
        <button type="submit" [disabled]="taskForm.invalid">Guardar</button>
      </div>
    </form>
  </div>
</div>
